[pytest]
# Only discover tests in the tests/ directory
testpaths = tests

# Test file naming convention
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Strict markers: undefined markers cause errors
addopts =
    --strict-markers
    --tb=short
    -q

# Custom markers
markers =
    unit: Fast unit tests with no external dependencies (network, SMTP, DB file I/O)
    integration: Tests that exercise multiple components together
    slow: Tests that take > 5 seconds
    network: Tests that require internet access (should be skipped in CI)
    smtp: Tests that exercise SMTP email sending
    db: Tests that create/use temporary SQLite databases
    security: Security-focused tests (XSS, SSRF, auth, rate limiting)

# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
    ignore::PendingDeprecationWarning
